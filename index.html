<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Vivekananda Mission Institute - Student ID Card Generator</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="print.css" media="print">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<header class="topbar">

<div class="logo-area">

<img src="assets/logo.png" class="logo">

<div>

<h1>VIVEKANANDA MISSION INSTITUTE</h1>

<p>Following NEP 2020 • IKS (Govt. of India)</p>

</div>

</div>

<div class="buttons">

<button id="loadBtn">📂 Load Excel</button>

<button id="printAllBtn">🖨 Print All</button>

</div>

</header>

<section class="dashboard">

<div class="box">

<h3>Total Students</h3>

<p id="studentCount">0</p>

</div>

<div class="box">

<h3>Total Classes</h3>

<p id="classCount">0</p>

</div>

<div class="box">

<h3>Loaded File</h3>

<p id="fileName">None</p>

</div>

</section>

<section class="toolbar">

<input
id="searchBox"
type="text"
placeholder="Search Student">

<select id="classFilter">

<option value="ALL">

All Classes

</option>

</select>

<input
id="excelFile"
type="file"
accept=".xlsx,.xls"
hidden>

</section>

<main id="cardContainer">

<div class="welcome">

<h2>Student ID Card Generator</h2>

<p>Load an Excel file to begin.</p>

</div>

</main>

<footer>

© Vivekananda Mission Institute

</footer>

<script src="js/excel.js"></script>
<script src="js/card.js"></script>
<script src="js/qr.js"></script>
<script src="js/print.js"></script>
<script src="js/app.js"></script>

</body>

</html>
