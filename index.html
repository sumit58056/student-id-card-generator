<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ID Card Generator</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="print.css" media="print">

    <!-- XLSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>

<header>

    <div class="logo-area">

        <img src="assets/logo.png" class="logo">

        <div>

            <h1>VIVEKANANDA MISSION INSTITUTE</h1>

            <p>
                Affiliated to CBSE | NEP 2020 Pattern
            </p>

        </div>

    </div>

    <div class="buttons">

        <button id="loadExcelBtn">
            📂 Load Excel
        </button>

        <button id="printAllBtn">
            🖨 Print All
        </button>

    </div>

</header>

<section class="dashboard">

    <div class="box">

        <h2 id="studentCount">0</h2>

        <span>Total Students</span>

    </div>

    <div class="box">

        <h2 id="classCount">0</h2>

        <span>Classes</span>

    </div>

    <div class="box">

        <h2 id="loadedFile">None</h2>

        <span>Loaded File</span>

    </div>

</section>

<section class="toolbar">

    <input
            id="searchInput"
            placeholder="Search Student...">

    <select id="classFilter">

        <option value="">All Classes</option>

    </select>

</section>

<input
        type="file"
        id="excelFile"
        accept=".xlsx,.xls"
        hidden>

<main id="cardContainer">

</main>

<footer>

    Developed for Vivekananda Mission Institute

</footer>

<script src="js/excel.js"></script>
<script src="js/card.js"></script>
<script src="js/qr.js"></script>
<script src="js/print.js"></script>
<script src="js/app.js"></script>

</body>
</html>
